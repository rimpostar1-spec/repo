<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teleprompter Pro | ملقن النصوص الاحترافي</title>
    <style>
/* Google Fonts Import */
@import url('https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Cairo:wght@300;400;600;700;800;900&family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=El+Messiri:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&family=Roboto:ital,wght@0,300;0,400;0,500;0,700;1,300&family=Tajawal:wght@300;400;500;700;800;900&display=swap');

:root {
    --bg-main: #0b0c10;
    --bg-panel: rgba(21, 23, 30, 0.7);
    --bg-panel-solid: #15171e;
    --accent: #6366f1;
    --accent-hover: #4f46e5;
    --accent-glow: rgba(99, 102, 241, 0.4);
    --text-main: #f3f4f6;
    --text-muted: #9ca3af;
    --border-color: rgba(255, 255, 255, 0.08);
    --glow-color: rgba(99, 102, 241, 0.15);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
}

body {
    font-family: 'Inter', 'Cairo', sans-serif;
    background-color: var(--bg-main);
    color: var(--text-main);
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

/* App Container Layout */
#app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    width: 100vw;
    position: relative;
}

/* App Header */
header {
    height: 60px;
    background-color: rgba(11, 12, 16, 0.8);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border-color);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 30px;
    z-index: 10;
}

.logo {
    font-size: 20px;
    font-weight: 800;
    background: linear-gradient(135deg, #a5b4fc 0%, #6366f1 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo span {
    color: #818cf8;
}

.header-actions {
    display: flex;
    gap: 15px;
}

/* Base Buttons */
.btn {
    background-color: rgba(255, 255, 255, 0.05);
    color: var(--text-main);
    border: 1px solid var(--border-color);
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s ease;
}

.btn:hover {
    background-color: rgba(255, 255, 255, 0.1);
    border-color: rgba(255, 255, 255, 0.2);
    transform: translateY(-1px);
}

.btn-primary {
    background-color: var(--accent);
    border-color: var(--accent);
}

.btn-primary:hover {
    background-color: var(--accent-hover);
    border-color: var(--accent-hover);
    box-shadow: 0 0 15px var(--accent-glow);
}

/* Workspace Views */
.view {
    flex: 1;
    display: flex;
    overflow: hidden;
    position: relative;
}

#editor-view {
    padding: 30px;
    gap: 30px;
}

/* Editor Section */
.editor-container {
    flex: 1.5;
    display: flex;
    flex-direction: column;
    background-color: var(--bg-panel-solid);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.editor-header {
    padding: 15px 20px;
    background-color: rgba(0, 0, 0, 0.2);
    border-bottom: 1px solid var(--border-color);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.editor-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-muted);
}

textarea {
    flex: 1;
    background-color: transparent;
    border: none;
    outline: none;
    color: var(--text-main);
    padding: 25px;
    font-size: 18px;
    line-height: 1.6;
    resize: none;
    width: 100%;
    height: 100%;
}

/* Settings Sidebar */
.settings-sidebar {
    flex: 0.8;
    background-color: var(--bg-panel-solid);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    padding: 25px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    overflow-y: auto;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.settings-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    padding-bottom: 15px;
}

.settings-group:last-child {
    border-bottom: none;
}

.settings-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
}

.control-row {
    display: flex;
    gap: 10px;
}

/* Inputs and Selects */
select {
    width: 100%;
    background-color: #15171e;
    color: var(--text-main);
    border: 1px solid var(--border-color);
    padding: 10px;
    border-radius: 8px;
    outline: none;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s ease;
}

select:focus {
    border-color: var(--accent);
}

select option, select optgroup {
    background-color: #15171e !important;
    color: #ffffff !important;
}

.toggle-btn {
    flex: 1;
    background-color: rgba(255,255,255,0.03);
    border: 1px solid var(--border-color);
    padding: 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    text-align: center;
    transition: all 0.2s ease;
}

.toggle-btn.active {
    background-color: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 10px var(--accent-glow);
}

/* Sliders */
.slider-container {
    display: flex;
    align-items: center;
    gap: 15px;
}

.slider-container input[type="range"] {
    flex: 1;
    accent-color: var(--accent);
    height: 6px;
    border-radius: 3px;
    outline: none;
}

.slider-val {
    min-width: 40px;
    text-align: right;
    font-weight: 700;
    font-size: 14px;
}

/* Teleprompter View */
#prompter-view {
    background-color: #000;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
}

.hidden {
    display: none !important;
}

/* Reading Display */
.prompter-container {
    flex: 1;
    width: 100%;
    overflow-y: scroll;
    padding: 40vh 0;
    position: relative;
    scrollbar-width: none;
}

.prompter-container::-webkit-scrollbar {
    display: none;
}

.prompter-text {
    width: 80%;
    margin: 0 auto;
    font-size: 48px;
    line-height: 1.8;
    color: #ffffff;
    transition: transform 0.1s ease;
    text-align: center;
    outline: none;
}

.prompter-text.rtl {
    direction: rtl;
    text-align: right;
}

.prompter-text.ltr {
    direction: ltr;
    text-align: left;
}

/* Focus Indicator Line */
.focus-indicator {
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 120px;
    transform: translateY(-50%);
    pointer-events: none;
    border-top: 2px dashed rgba(99, 102, 241, 0.4);
    border-bottom: 2px dashed rgba(99, 102, 241, 0.4);
    background: linear-gradient(180deg, rgba(99, 102, 241, 0.05) 0%, rgba(99, 102, 241, 0) 50%, rgba(99, 102, 241, 0.05) 100%);
    z-index: 5;
}

/* Floating HUD Controls */
.hud-panel {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-panel);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border-color);
    padding: 15px 30px;
    border-radius: 100px;
    display: flex;
    align-items: center;
    gap: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.8);
    z-index: 100;
    transition: opacity 0.3s ease;
}

.hud-panel:hover {
    opacity: 1 !important;
}

.hud-group {
    display: flex;
    align-items: center;
    gap: 10px;
}

.hud-separator {
    width: 1px;
    height: 25px;
    background-color: var(--border-color);
}

.hud-btn {
    background-color: rgba(255,255,255,0.05);
    border: 1px solid var(--border-color);
    width: 50px;
    height: 50px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: white;
    transition: all 0.2s ease;
}

.hud-btn:hover {
    background-color: var(--accent);
    border-color: var(--accent);
    transform: scale(1.05);
    box-shadow: 0 0 15px var(--accent-glow);
}

.hud-btn-large {
    width: 60px;
    height: 60px;
    background-color: var(--accent);
    border-color: var(--accent);
}

.hud-btn-large:hover {
    background-color: var(--accent-hover);
    border-color: var(--accent-hover);
}

.voice-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-muted);
}

.voice-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background-color: var(--text-muted);
}

.voice-dot.active {
    background-color: #ef4444;
    box-shadow: 0 0 10px rgba(239, 68, 68, 0.8);
    animation: pulse 1.5s infinite;
}

.mirrored {
    transform: scaleX(-1);
}

@keyframes pulse {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.2); opacity: 0.5; }
    100% { transform: scale(1); opacity: 1; }
}

[data-tooltip] {
    position: relative;
}

[data-tooltip]::before {
    content: attr(data-tooltip);
    position: absolute;
    bottom: 125%;
    left: 50%;
    transform: translateX(-50%);
    background-color: #111;
    color: white;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
    box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    border: 1px solid var(--border-color);
}

[data-tooltip]:hover::before {
    opacity: 1;
}

.prompter-settings-panel {
    position: absolute;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-panel);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border-color);
    padding: 15px 25px;
    border-radius: 16px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.8);
    z-index: 99;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-width: 280px;
    transition: opacity 0.3s ease;
}

.settings-panel-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 15px;
}

.settings-panel-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
}

.color-options {
    display: flex;
    align-items: center;
    gap: 8px;
}

.color-dot {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.2s ease;
    outline: none;
}

.color-dot.active {
    border-color: var(--accent);
    transform: scale(1.15);
    box-shadow: 0 0 8px var(--accent-glow);
}

.color-options input[type="color"] {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    background: none;
    padding: 0;
    outline: none;
}

.color-options input[type="color"]::-webkit-color-swatch-wrapper {
    padding: 0;
}

.color-options input[type="color"]::-webkit-color-swatch {
    border: 2px solid var(--border-color);
    border-radius: 50%;
}

/* Drafts Sidebar Drawer Styling */
.drafts-sidebar {
    flex: 0.6;
    background-color: var(--bg-panel-solid);
    border: 1px solid var(--border-color);
    border-radius: 16px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    overflow-y: auto;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    max-height: 100%;
}

.drafts-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border-color);
    padding-bottom: 10px;
}

.drafts-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-muted);
}

.draft-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background-color: rgba(255,255,255,0.02);
    border: 1px solid var(--border-color);
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
    gap: 10px;
}

.draft-item:hover {
    background-color: rgba(255, 255, 255, 0.06);
    border-color: var(--accent);
}

.draft-item.active {
    border-color: var(--accent);
    background-color: rgba(99, 102, 241, 0.08);
}

.draft-name {
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    text-align: right;
}

.draft-actions {
    display: flex;
    gap: 4px;
}

.draft-btn-delete {
    background: none;
    border: none;
    color: #ef4444;
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.6;
    transition: all 0.2s ease;
}

.draft-btn-delete:hover {
    opacity: 1;
    background-color: rgba(239, 68, 68, 0.1);
}

/* Editor Footer Statistics */
.editor-footer {
    padding: 12px 20px;
    background-color: rgba(0, 0, 0, 0.15);
    border-top: 1px solid var(--border-color);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 15px;
}

.editor-stats {
    display: flex;
    gap: 20px;
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 600;
}

.editor-stats span strong {
    color: var(--text-main);
}

.dictation-container {
    display: flex;
    align-items: center;
    gap: 10px;
}

.btn-dictate {
    background-color: rgba(239, 68, 68, 0.08);
    color: #ef4444;
    border: 1px solid rgba(239, 68, 68, 0.15);
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s ease;
}

.btn-dictate:hover {
    background-color: rgba(239, 68, 68, 0.15);
    border-color: rgba(239, 68, 68, 0.3);
}

.btn-dictate.active {
    background-color: #ef4444;
    border-color: #ef4444;
    color: white;
    animation: pulse 1.5s infinite;
}

/* Eyeline Indicator Arrows */
.eyeline-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 0;
    height: 0;
    border-top: 12px solid transparent;
    border-bottom: 12px solid transparent;
    z-index: 10;
    filter: drop-shadow(0 0 6px var(--accent-glow));
    animation: arrow-pulse 1.5s infinite;
}

.eyeline-arrow.left-arrow {
    left: 20px;
    border-left: 16px solid var(--accent);
}

.eyeline-arrow.right-arrow {
    right: 20px;
    border-right: 16px solid var(--accent);
}

@keyframes arrow-pulse {
    0% { opacity: 0.4; transform: translateY(-50%) scale(0.95); }
    50% { opacity: 1; transform: translateY(-50%) scale(1.05); }
    100% { opacity: 0.4; transform: translateY(-50%) scale(0.95); }
}

/* Focus Masking / Inactive Line Dimming */
.prompter-text.focus-mask p {
    opacity: 0.12;
    transform: scale(0.97);
    transition: opacity 0.12s ease, transform 0.12s ease;
}

.prompter-text.focus-mask p.active-p {
    opacity: 1;
    transform: scale(1.04);
    text-shadow: 0 0 10px rgba(255,255,255,0.1);
}

/* Markdown and Accent Tag Styles */
.prompter-text strong, textarea.formatted-bold {
    font-weight: 800;
    border-bottom: 2px solid var(--accent);
    padding-bottom: 1px;
}

.prompter-text em {
    font-style: italic;
    color: #e2e8f0;
    opacity: 0.95;
}

.accent-red { color: #f87171 !important; font-weight: 800; }
.accent-yellow { color: #facc15 !important; font-weight: 800; }
.accent-green { color: #4ade80 !important; font-weight: 800; }
.accent-blue { color: #38bdf8 !important; font-weight: 800; }

/* Document Picture-in-Picture window modifications override */
.pip-body {
    background-color: #000000 !important;
    color: #ffffff !important;
    font-family: 'Cairo', 'Inter', sans-serif;
    margin: 0;
    padding: 10px;
    overflow-y: scroll;
    scrollbar-width: none;
}
.pip-body::-webkit-scrollbar {
    display: none;
}
.pip-text {
    width: 90% !important;
    margin: 0 auto;
    font-size: 32px;
    line-height: 1.6;
    text-align: center;
}
.pip-text.rtl {
    direction: rtl;
    text-align: right;
}
.pip-text.ltr {
    direction: ltr;
    text-align: left;
}
.pip-focus {
    position: fixed;
    top: 50%;
    left: 0;
    right: 0;
    height: 80px;
    transform: translateY(-50%);
    border-top: 1px dashed rgba(99, 102, 241, 0.4);
    border-bottom: 1px dashed rgba(99, 102, 241, 0.4);
    pointer-events: none;
}

/* Mobile Toggle Buttons (Desktop Hidden) */
.mobile-toggle-btn {
    display: none !important;
}

/* Backdrop for Mobile Drawers */
.sidebar-backdrop {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(4px);
    z-index: 95;
    transition: opacity 0.25s ease;
}
.sidebar-backdrop.hidden {
    display: none;
}

/* Responsive Media Queries */
@media (max-width: 1024px) {
    .mobile-toggle-btn {
        display: flex !important;
        gap: 5px;
        align-items: center;
        font-size: 12px !important;
        padding: 6px 10px !important;
    }
    
    .drafts-sidebar {
        position: fixed !important;
        top: 0;
        bottom: 0;
        left: 0;
        right: auto;
        width: 280px;
        max-width: 80%;
        z-index: 100;
        transform: translateX(-100%);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        border-radius: 0 16px 16px 0;
        border: none;
        border-right: 1px solid var(--border-color);
        background-color: #0c0d12;
    }
    .drafts-sidebar.active {
        transform: translateX(0);
    }
    
    .settings-sidebar {
        position: fixed !important;
        top: 0;
        bottom: 0;
        right: 0;
        left: auto;
        width: 280px;
        max-width: 80%;
        z-index: 100;
        transform: translateX(100%);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        border-radius: 16px 0 0 16px;
        border: none;
        border-left: 1px solid var(--border-color);
        background-color: #0c0d12;
    }
    .settings-sidebar.active {
        transform: translateX(0);
    }
    
    .editor-container {
        flex: 1 !important;
        width: 100%;
    }
    
    .hud-panel {
        width: 90% !important;
        max-width: 480px;
        flex-wrap: wrap;
        justify-content: center;
        gap: 6px !important;
        padding: 8px 12px !important;
        bottom: 12px !important;
        border-radius: 12px !important;
    }
    .hud-separator {
        display: none !important;
    }
    .hud-btn {
        width: 32px !important;
        height: 32px !important;
        font-size: 11px !important;
        padding: 0 !important;
    }
    .hud-btn svg {
        width: 16px !important;
        height: 16px !important;
    }
    .hud-btn-large {
        width: 38px !important;
        height: 38px !important;
    }
    .hud-btn-large svg {
        width: 20px !important;
        height: 20px !important;
    }
    .prompter-settings-panel {
        bottom: 115px !important;
        width: 90%;
        max-width: 300px;
        padding: 12px 15px !important;
        gap: 8px !important;
    }
}

@media (max-width: 500px) {
    .app-header {
        padding: 10px 15px !important;
    }
    .app-header .logo {
        font-size: 15px;
    }
    .app-header .logo span {
        display: none;
    }
    #btn-import span, #btn-save span {
        display: none;
    }
    #btn-import, #btn-save {
        padding: 8px !important;
    }
    .mobile-toggle-btn {
        padding: 6px 8px !important;
        font-size: 11px !important;
    }
    .editor-footer {
        flex-direction: column;
        gap: 8px;
        align-items: stretch;
        padding: 10px 15px !important;
    }
    .editor-stats {
        justify-content: space-between;
        font-size: 11px !important;
        gap: 10px !important;
    }
    .btn-dictate {
        width: 100%;
        justify-content: center;
    }
}
    </style>
</head>
<body>
    <div id="app">
        <!-- Backdrop for Mobile Drawers -->

    <script>
// State Variables
let isPlaying = false;
let scrollSpeed = 20; // range: 1 - 100
let fontSize = 48; // in px
let marginWidth = 80; // in %
let isMirrored = false;
let isRtl = true; // default RTL for Arabic
let selectedFont = 'Cairo';
let lastTimestamp = 0;
let voiceActive = false;
let recognition = null;
let scriptContent = '';
let textColor = '#ffffff';
let bgColor = '#000000';

// Advanced Feature Variables
let dictationActive = false;
let dictationRecognition = null;
let focusMaskActive = false;
let pipActive = false;
let pipWindow = null;
let currentDraftName = '';
let gamepadButtonsState = {};
let currentScrollY = 0;

// DOM Elements
const editorView = document.getElementById('editor-view');
const prompterView = document.getElementById('prompter-view');
const scriptTextarea = document.getElementById('script-textarea');
const prompterContainer = document.getElementById('prompter-container');
const prompterText = document.getElementById('prompter-text');
const hudPanel = document.getElementById('hud-panel');

// Control Inputs
const btnLaunch = document.getElementById('btn-launch');
const btnBack = document.getElementById('btn-back');
const btnImport = document.getElementById('btn-import');
const fileInput = document.getElementById('file-input');
const btnSave = document.getElementById('btn-save');

const selectFont = document.getElementById('select-font');
const toggleRtl = document.getElementById('toggle-rtl');
const toggleLtr = document.getElementById('toggle-ltr');
const toggleMirror = document.getElementById('toggle-mirror');

const sliderFontSize = document.getElementById('slider-font-size');
const valFontSize = document.getElementById('val-font-size');
const sliderSpeed = document.getElementById('slider-speed');
const valSpeed = document.getElementById('val-speed');
const sliderMargin = document.getElementById('slider-margin');
const valMargin = document.getElementById('val-margin');

// HUD Control Buttons
const btnHudPlay = document.getElementById('hud-play');
const btnHudRewind = document.getElementById('hud-rewind');
const btnHudVoice = document.getElementById('hud-voice');
const btnHudFontUp = document.getElementById('hud-font-up');
const btnHudFontDown = document.getElementById('hud-font-down');
const btnHudMirror = document.getElementById('hud-mirror');
const btnHudExit = document.getElementById('hud-exit');
const voiceDot = document.getElementById('voice-dot');
const speedDisplay = document.getElementById('speed-display');
const btnHudSpeedUp = document.getElementById('hud-speed-up');
const btnHudSpeedDown = document.getElementById('hud-speed-down');
const btnHudColors = document.getElementById('hud-colors');
const btnHudFocusMask = document.getElementById('hud-focus-mask');
const btnHudPip = document.getElementById('hud-pip');

// Colors Panel Elements
const prompterSettingsPanel = document.getElementById('prompter-settings-panel');
const textColorPicker = document.getElementById('text-color-picker');
const bgColorPicker = document.getElementById('bg-color-picker');
const textColorsGroup = document.getElementById('text-color-options');
const bgColorsGroup = document.getElementById('bg-color-options');

// New Advanced Feature Bindings
const btnSaveDraft = document.getElementById('btn-save-draft');
const draftsList = document.getElementById('drafts-list');
const btnDictate = document.getElementById('btn-dictate');
const statDuration = document.getElementById('stat-duration');
const statWords = document.getElementById('stat-words');
const statChars = document.getElementById('stat-chars');

// Initialize Web Speech API for Auto Voice Scrolling
function initSpeechRecognition() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        btnHudVoice.style.display = 'none';
        console.log('Web Speech API is not supported in this browser.');
        return;
    }

    recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = isRtl ? 'ar-EG' : 'en-US';

    recognition.onresult = (event) => {
        if (!voiceActive) return;
        
        let interimTranscript = '';
        for (let i = event.resultIndex; i < event.results.length; ++i) {
            if (event.results[i].isFinal) {
                const finalWord = event.results[i][0].transcript.trim().toLowerCase();
                matchAndScroll(finalWord);
            }
        }
    };

    recognition.onerror = (event) => {
        console.error('Speech recognition error:', event.error);
        if (event.error === 'not-allowed' || event.error === 'service-not-allowed') {
            if (voiceActive) toggleVoiceScroll();
        }
    };

    recognition.onend = () => {
        if (voiceActive) {
            recognition.start();
        }
    };
}

// Match spoken words to paragraphs and scroll smoothly
function matchAndScroll(spokenText) {
    const paragraphs = prompterText.getElementsByTagName('p');
    const spokenWords = spokenText.split(' ');
    
    for (let pIndex = 0; pIndex < paragraphs.length; pIndex++) {
        const pText = paragraphs[pIndex].innerText.toLowerCase();
        
        let matchCount = 0;
        for (let word of spokenWords) {
            if (pText.includes(word) && word.length > 2) {
                matchCount++;
            }
        }
        
        if (matchCount >= Math.min(spokenWords.length, 2)) {
            const element = paragraphs[pIndex];
            const containerHeight = prompterContainer.clientHeight;
            const elementOffset = element.offsetTop;
            const elementHeight = element.clientHeight;
            
            const targetScrollTop = elementOffset - (containerHeight / 2) + (elementHeight / 2);
            
            prompterContainer.scrollTo({
                top: targetScrollTop,
                behavior: 'smooth'
            });
            break;
        }
    }
}

// Event Listeners for Editor
btnLaunch.addEventListener('click', () => {
    scriptContent = scriptTextarea.value.trim();
    if (!scriptContent) {
        alert(isRtl ? 'رجاءً اكتب أو الصق النص أولاً!' : 'Please write or paste script first!');
        return;
    }
    
    prompterText.innerHTML = splitIntoSentences(scriptContent)
        .map(s => `<p>${parseFormattedText(s)}</p>`)
        .join('');
        
    prompterContainer.scrollTop = 0;
    currentScrollY = 0;
    
    if (focusMaskActive) {
        updateFocusMask();
    }
        
    editorView.classList.add('hidden');
    prompterView.classList.remove('hidden');
    
    if (typeof draftsSidebar !== 'undefined' && draftsSidebar) {
        draftsSidebar.classList.remove('active');
        settingsSidebar.classList.remove('active');
        sidebarBackdrop.classList.add('hidden');
    }
    
    applyConfig();
});

btnBack.addEventListener('click', exitPrompter);
btnHudExit.addEventListener('click', exitPrompter);

function exitPrompter() {
    stopScroll();
    if (voiceActive) toggleVoiceScroll();
    prompterView.classList.add('hidden');
    editorView.classList.remove('hidden');
}

// Settings Change Listeners
selectFont.addEventListener('change', (e) => {
    selectedFont = e.target.value;
    applyConfig();
});

toggleRtl.addEventListener('click', () => {
    isRtl = true;
    toggleRtl.classList.add('active');
    toggleLtr.classList.remove('active');
    if (recognition) recognition.lang = 'ar-EG';
    applyConfig();
});

toggleLtr.addEventListener('click', () => {
    isRtl = false;
    toggleLtr.classList.add('active');
    toggleRtl.classList.remove('active');
    if (recognition) recognition.lang = 'en-US';
    applyConfig();
});

toggleMirror.addEventListener('click', toggleMirrorState);
btnHudMirror.addEventListener('click', toggleMirrorState);

function toggleMirrorState() {
    isMirrored = !isMirrored;
    if (isMirrored) {
        toggleMirror.classList.add('active');
        btnHudMirror.classList.add('active');
    } else {
        toggleMirror.classList.remove('active');
        btnHudMirror.classList.remove('active');
    }
    applyConfig();
}

// Font Size Controls
sliderFontSize.addEventListener('input', (e) => {
    fontSize = parseInt(e.target.value);
    valFontSize.innerText = `${fontSize}px`;
    applyConfig();
});

btnHudFontUp.addEventListener('click', () => {
    if (fontSize < 120) {
        fontSize += 4;
        sliderFontSize.value = fontSize;
        valFontSize.innerText = `${fontSize}px`;
        applyConfig();
    }
});

btnHudFontDown.addEventListener('click', () => {
    if (fontSize > 20) {
        fontSize -= 4;
        sliderFontSize.value = fontSize;
        valFontSize.innerText = `${fontSize}px`;
        applyConfig();
    }
});

// Speed Controls
sliderSpeed.addEventListener('input', (e) => {
    scrollSpeed = parseInt(e.target.value);
    valSpeed.innerText = scrollSpeed;
    updateSpeedHUD();
});

// Margin Controls
sliderMargin.addEventListener('input', (e) => {
    marginWidth = parseInt(e.target.value);
    valMargin.innerText = `${marginWidth}%`;
    applyConfig();
});

// Import Script
btnImport.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (event) => {
        scriptTextarea.value = event.target.result;
    };
    reader.readAsText(file);
});

// Save Script
btnSave.addEventListener('click', () => {
    const text = scriptTextarea.value;
    if (!text) return;
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'teleprompter_script.txt';
    a.click();
});

// Apply Configurations to Prompter Screen
function applyConfig() {
    prompterText.style.color = textColor;
    prompterView.style.backgroundColor = bgColor;
    scriptTextarea.style.color = textColor;
    scriptTextarea.style.backgroundColor = bgColor;

    prompterText.style.fontFamily = `'${selectedFont}', sans-serif`;
    prompterText.style.fontSize = `${fontSize}px`;
    prompterText.style.width = `${marginWidth}%`;
    
    scriptTextarea.style.fontFamily = `'${selectedFont}', sans-serif`;
    scriptTextarea.style.fontSize = `${fontSize}px`;

// Smooth Auto Scroll Engine
function autoScroll(timestamp) {
    if (!isPlaying || voiceActive) return;

    if (!lastTimestamp) lastTimestamp = timestamp;
    const delta = timestamp - lastTimestamp;
    lastTimestamp = timestamp;

    const speedFactor = (scrollSpeed / 100) * 0.15;
    
    currentScrollY += speedFactor * delta;
    prompterContainer.scrollTop = Math.round(currentScrollY);

    if (focusMaskActive) {
        updateFocusMask();
    }

    if (pipActive && pipWindow) {
        const pipContainer = pipWindow.document.getElementById('pip-container');
        if (pipContainer) {
            const maxPrompterScroll = prompterContainer.scrollHeight - prompterContainer.clientHeight;
            const ratio = maxPrompterScroll > 0 ? prompterContainer.scrollTop / maxPrompterScroll : 0;
            const maxPipScroll = pipContainer.scrollHeight - pipContainer.clientHeight;
            pipContainer.scrollTop = ratio * maxPipScroll;
        }
    }

    if (prompterContainer.scrollTop + prompterContainer.clientHeight >= prompterContainer.scrollHeight - 5) {
        stopScroll();
    } else {
        requestAnimationFrame(autoScroll);
    }
}

// Start Scrolling
function startScroll() {
    isPlaying = true;
    lastTimestamp = 0;
    currentScrollY = prompterContainer.scrollTop;
    btnHudPlay.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="6" y="4" width="4" height="16" fill="currentColor"/><rect x="14" y="4" width="4" height="16" fill="currentColor"/></svg>';

function parseFormattedText(text) {
    let html = text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    
    html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
    
    html = html.replace(/\[red\](.*?)\[\/red\]/g, '<span class="accent-red">$1</span>');
    html = html.replace(/\[yellow\](.*?)\[\/yellow\]/g, '<span class="accent-yellow">$1</span>');
    html = html.replace(/\[green\](.*?)\[\/green\]/g, '<span class="accent-green">$1</span>');
    html = html.replace(/\[blue\](.*?)\[\/blue\]/g, '<span class="accent-blue">$1</span>');
    
    return html;
}

function splitIntoSentences(text) {
    const paragraphs = text.split('\n');
    const result = [];
    
    paragraphs.forEach(p => {
        const trimmedP = p.trim();
        if (!trimmedP) return;
        
        const parts = trimmedP.split(/([.!?؟]+(?:\s+|$))/);
        let currentSentence = '';
        
        for (let i = 0; i < parts.length; i++) {
            if (i % 2 === 0) {
                currentSentence = parts[i];
            } else {
                currentSentence += parts[i].trim();
                if (currentSentence.trim()) {
                    result.push(currentSentence.trim());
                }
                currentSentence = '';
            }
        }
        if (currentSentence.trim()) {
            result.push(currentSentence.trim());
        }
    });
    
    return result;
}

function updateFocusMask() {
    const paragraphs = prompterText.getElementsByTagName('p');
    if (paragraphs.length === 0) return;
    
    if (!focusMaskActive) {
        for (let p of paragraphs) {
            p.style.opacity = '';
            p.style.transform = '';
            p.style.textShadow = '';
            p.style.transition = '';
        }
        return;
    }
    
    const containerRect = prompterContainer.getBoundingClientRect();
    const centerLine = containerRect.top + (containerRect.height / 2);
    
    let closestP = null;
    let minDistance = Infinity;
    
    for (let p of paragraphs) {
        const rect = p.getBoundingClientRect();
        
        if (rect.height === 0 || !p.innerText.trim()) continue;
        
        const pCenter = rect.top + (rect.height / 2);
        const distance = Math.abs(pCenter - centerLine);
        if (distance < minDistance) {
            minDistance = distance;
            closestP = p;
        }
    }
    
    for (let p of paragraphs) {
        if (p === closestP) {
            p.style.opacity = '1';
            p.style.transform = 'scale(1.04)';
            p.style.textShadow = '0 0 10px rgba(255, 255, 255, 0.2)';
            p.style.transition = 'opacity 0.12s ease, transform 0.12s ease';
        } else {
            p.style.opacity = '0.12';
            p.style.transform = 'scale(0.97)';
            p.style.textShadow = 'none';
            p.style.transition = 'opacity 0.12s ease, transform 0.12s ease';
        }
    }
}

async function togglePiP() {
    if (!window.documentPictureInPicture) {
        alert(isRtl 
            ? "ميزة التلقين العائم غير مدعومة في هذا المتصفح. يرجى استخدام متصفح Chrome حديث." 
            : "Picture-in-Picture is not supported in this browser.");
        return;
    }
    
    if (pipActive) {
        if (pipWindow) pipWindow.close();
        return;
    }
    
    try {
        pipWindow = await window.documentPictureInPicture.requestWindow({
            width: 500,
            height: 350
        });
        
        pipActive = true;
        btnHudPip.classList.add('active');
        
        [...document.styleSheets].forEach((styleSheet) => {
            try {
                const cssRules = [...styleSheet.cssRules].map((rule) => rule.cssText).join('');
                const style = document.createElement('style');
                style.textContent = cssRules;
                pipWindow.document.head.appendChild(style);
            } catch (e) {
                const link = document.createElement('link');
                link.rel = 'stylesheet';
                link.type = styleSheet.type;
                link.media = styleSheet.media;
                link.href = styleSheet.href;
                pipWindow.document.head.appendChild(link);
            }
        });
        
        const body = pipWindow.document.body;
        body.classList.add('pip-body');
        
        const pipContainer = pipWindow.document.createElement('div');
        pipContainer.id = 'pip-container';
        pipContainer.className = 'prompter-container';
        pipContainer.style.height = '100vh';
        pipContainer.style.overflowY = 'scroll';
        
        const pipText = prompterText.cloneNode(true);
        pipText.id = 'pip-text';
        pipText.className = 'pip-text ' + (isRtl ? 'rtl' : 'ltr') + ' ' + (isMirrored ? 'mirrored' : '');
        pipText.style.fontFamily = prompterText.style.fontFamily;
        pipText.style.fontSize = `${fontSize * 0.7}px`;
        pipText.style.color = textColor;
        
        pipContainer.appendChild(pipText);
        
        const pipFocus = pipWindow.document.createElement('div');
        pipFocus.className = 'pip-focus';
        pipContainer.appendChild(pipFocus);
        
        body.appendChild(pipContainer);
        
        pipWindow.addEventListener('unload', () => {
            pipActive = false;
            pipWindow = null;
            btnHudPip.classList.remove('active');
        });
    } catch (err) {
        console.error("Failed to open PiP window:", err);
        pipActive = false;
    }
}

function pollGamepad() {
    const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
    if (!gamepads) return;
    
    for (let gp of gamepads) {
        if (!gp) continue;
        
        if (gp.buttons[0].pressed) {
            if (!gamepadButtonsState[0]) {
                btnHudPlay.click();
                gamepadButtonsState[0] = true;
            }
        } else {
            gamepadButtonsState[0] = false;
        }
        
        if (gp.buttons[12].pressed) {
            scrollSpeed = Math.min(scrollSpeed + 0.3, 100);
            sliderSpeed.value = Math.round(scrollSpeed);
            updateSpeedHUD();
        }
        if (gp.buttons[13].pressed) {
            scrollSpeed = Math.max(scrollSpeed - 0.3, 1);
            sliderSpeed.value = Math.round(scrollSpeed);
            updateSpeedHUD();
        }
        
        if (gp.buttons[14].pressed) {
            if (!gamepadButtonsState[14]) {
                btnHudFontDown.click();
                gamepadButtonsState[14] = true;
            }
        } else {
            gamepadButtonsState[14] = false;
        }
        if (gp.buttons[15].pressed) {
            if (!gamepadButtonsState[15]) {
                btnHudFontUp.click();
                gamepadButtonsState[15] = true;
            }
        } else {
            gamepadButtonsState[15] = false;
        }
    }
}

function gamepadLoop() {
    pollGamepad();
    requestAnimationFrame(gamepadLoop);
}

function getDrafts() {
    const drafts = localStorage.getItem('prompter_drafts');
    return drafts ? JSON.parse(drafts) : {};
}

function saveDrafts(drafts) {

}

function loadDraftList() {
    const drafts = getDrafts();
    draftsList.innerHTML = '';
    const keys = Object.keys(drafts);
    if (keys.length === 0) {
        draftsList.innerHTML = `<div style="text-align: center; color: var(--text-muted); font-size: 11px; padding: 15px;">لا توجد مسودات محفوظة</div>`;
        return;
    }
    keys.forEach(key => {
        const item = document.createElement('div');
        item.className = 'draft-item' + (currentDraftName === key ? ' active' : '');
        item.innerHTML = `
            <div class="draft-actions">
                <button class="draft-btn-delete" data-name="${key}">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                </button>
            </div>
            <div class="draft-name">${key}</div>
        `;
        item.addEventListener('click', (e) => {
            if (e.target.closest('.draft-btn-delete')) return;
            loadDraft(key);
        });
        draftsList.appendChild(item);
    });
}

function saveCurrentDraft() {
    const text = scriptTextarea.value.trim();
    if (!text) {
        alert(isRtl ? "اكتب نصاً أولاً لحفظه!" : "Write some text first to save!");
        return;
    }
    let name = prompt(isRtl ? "أدخل اسم المسودة الجديدة:" : "Enter draft name:", currentDraftName || (isRtl ? "مسودة جديدة" : "New Draft"));
    if (!name) return;
    name = name.trim();
    const drafts = getDrafts();
    drafts[name] = {
        text: text,
        timestamp: Date.now(),
        settings: {
            fontSize,
            scrollSpeed,
            marginWidth,
            selectedFont,
            isRtl,
            textColor,
            bgColor
        }
    };
    saveDrafts(drafts);
    currentDraftName = name;
    loadDraftList();
}

// Load draft from storage
function loadDraft(name) {
    const drafts = getDrafts();
    const draft = drafts[name];
    if (!draft) return;
    scriptTextarea.value = draft.text;
    currentDraftName = name;
    
    if (draft.settings) {
        fontSize = draft.settings.fontSize || fontSize;
        scrollSpeed = draft.settings.scrollSpeed || scrollSpeed;
        marginWidth = draft.settings.marginWidth || marginWidth;
        selectedFont = draft.settings.selectedFont || selectedFont;
        isRtl = draft.settings.isRtl !== undefined ? draft.settings.isRtl : isRtl;
        textColor = draft.settings.textColor || textColor;
        bgColor = draft.settings.bgColor || bgColor;
        
        sliderFontSize.value = fontSize;
        valFontSize.innerText = `${fontSize}px`;
        sliderSpeed.value = scrollSpeed;
        valSpeed.innerText = scrollSpeed;
        sliderMargin.value = marginWidth;
        valMargin.innerText = `${marginWidth}%`;
        selectFont.value = selectedFont;
        
        if (isRtl) {
            toggleRtl.classList.add('active');
            toggleLtr.classList.remove('active');
        } else {
            toggleLtr.classList.add('active');
            toggleRtl.classList.remove('active');
        }
    }
    
    if (typeof draftsSidebar !== 'undefined' && draftsSidebar) {
        draftsSidebar.classList.remove('active');
        sidebarBackdrop.classList.add('hidden');
    }
    
    applyConfig();
    updateStats();
    loadDraftList();
}

function deleteDraft(name) {
    if (!confirm(isRtl ? `هل أنت متأكد من حذف المسودة "${name}"؟` : `Are you sure you want to delete draft "${name}"?`)) return;
    const drafts = getDrafts();
    delete drafts[name];
    saveDrafts(drafts);
    if (currentDraftName === name) currentDraftName = '';
    loadDraftList();
}

function initDictation() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        btnDictate.style.display = 'none';
        return;
    }
    
    dictationRecognition = new SpeechRecognition();
    dictationRecognition.continuous = true;
    dictationRecognition.interimResults = true;
    dictationRecognition.lang = isRtl ? 'ar-EG' : 'en-US';
    
    dictationRecognition.onresult = (event) => {
        let finalTranscript = '';
        for (let i = event.resultIndex; i < event.results.length; ++i) {
            if (event.results[i].isFinal) {
                finalTranscript += event.results[i][0].transcript + ' ';
            }
        }
        
        if (finalTranscript) {
            const pos = scriptTextarea.selectionStart;
            const text = scriptTextarea.value;
            scriptTextarea.value = text.substring(0, pos) + finalTranscript + text.substring(pos);
            scriptTextarea.selectionStart = scriptTextarea.selectionEnd = pos + finalTranscript.length;
            updateStats();
            applyConfig();
        }
    };
    
    dictationRecognition.onerror = (event) => {
        console.error('Dictation error:', event.error);
        if (event.error === 'not-allowed' || event.error === 'service-not-allowed') {
            if (dictationActive) toggleDictation();
        }
    };
    
    dictationRecognition.onend = () => {
        if (dictationActive) {
            dictationRecognition.start();
        }
    };
}

function toggleDictation() {
    if (!dictationRecognition) initDictation();
    if (!dictationRecognition) return;
    
    dictationActive = !dictationActive;
    if (dictationActive) {
        btnDictate.classList.add('active');
        dictationRecognition.lang = isRtl ? 'ar-EG' : 'en-US';
        dictationRecognition.start();
    } else {
        btnDictate.classList.remove('active');
        dictationRecognition.stop();
    }
}

function updateStats() {
    const text = scriptTextarea.value.trim();
    const chars = text.length;
    const words = text ? text.split(/\s+/).length : 0;
    
    const speedMult = scrollSpeed / 20;
    const wpm = Math.max(40, 130 * speedMult);
    const totalSeconds = words ? Math.round((words / wpm) * 60) : 0;
    
    const minutes = Math.floor(totalSeconds / 60);
    const seconds = totalSeconds % 60;
    
    statWords.innerText = words;
    statChars.innerText = chars;
    statDuration.innerText = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
}
